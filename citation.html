<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0a0a;
  --paper:#141414;
  --ink:#fff;
  --muted:#a0a0a0;
  --accent:#f59e0b;
  --border:#2e2e2e;
  --mono:'DM Mono', monospace;
  --serif:'Playfair Display', serif;
  --sans:'DM Sans', sans-serif;
}

*,
*::before,
*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

#citation-root{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  min-height:70vh;
  padding:2rem 1rem 4rem;
}

/* page header */
#citation-root header{
  max-width:700px;
  margin:0 auto 2rem;
  border-bottom:3px double var(--accent);
  padding-bottom:1rem;
}

#citation-root h1{
  font-family:var(--serif);
  font-size:clamp(1.8rem,5vw,2.6rem);
}

#citation-root header p{
  margin-top:.45rem;
  font-size:.9rem;
  color:var(--muted);
  font-family:var(--mono);
}

/* main card */
.cite-card{
  max-width:700px;
  margin:auto;
  background:var(--paper);
  border:1px solid var(--border);
  border-radius:6px;
  padding:2rem;
  box-shadow:4px 4px 0 var(--accent);
}

/* form */
.field{
  margin-bottom:1rem;
}

.field label{
  display:block;
  margin-bottom:.4rem;
  font-size:.78rem;
  letter-spacing:.05em;
  text-transform:uppercase;
  font-family:var(--mono);
  color:var(--muted);
}

.field input,
.field select{
  width:100%;
  padding:.65rem .8rem;
  background:#1e1e1e;
  color:#fff;
  border:1px solid var(--border);
  border-radius:4px;
  font-size:.95rem;
}

.field input:focus,
.field select:focus{
  outline:none;
  border-color:var(--accent);
}

.field input.error{
  border-color:#ef4444;
  background:#1f0f0f;
}

/* buttons */
.btn-row{
  display:flex;
  gap:.7rem;
  flex-wrap:wrap;
  margin-top:1.2rem;
}

button{
  cursor:pointer;
  padding:.55rem 1rem;
  border-radius:4px;
  border:1px solid var(--border);
  font-family:var(--mono);
}

.btn-primary{
  background:var(--accent);
  color:#000;
  font-weight:700;
}

.btn-ghost{
  background:transparent;
  color:#fff;
}

.btn-save{
  background:#fff;
  color:#000;
  font-weight:700;
}

/* output */
.output-box{
  margin-top:1.2rem;
  padding:1rem;
  background:#1a1500;
  border-left:4px solid var(--accent);
  display:none;
}

.output-box.visible{
  display:block;
}

.output-label{
  font-family:var(--mono);
  font-size:.75rem;
  color:var(--accent);
  margin-bottom:.45rem;
}

#citation-text{
  line-height:1.6;
}

#parenthetical-text{
  margin-top:.55rem;
  font-size:.85rem;
  color:var(--muted);
  font-family:var(--mono);
}

#warning-box,
.score-banner{
  display:none;
  margin-top:.8rem;
  padding:.7rem .9rem;
  border-radius:4px;
}

#warning-box.visible,
.score-banner.visible{
  display:block;
}

#warning-box{
  background:#1f1200;
  border:1px solid var(--accent);
  color:#fcd34d;
}

.score-banner{
  background:#1a1a1a;
  border:1px solid var(--border);
  color:var(--muted);
  font-family:var(--mono);
}

/* saved list */
.saved-section{
  max-width:700px;
  margin:2rem auto 0;
  display:none;
}

.saved-section.visible{
  display:block;
}

.saved-header{
  display:flex;
  gap:1rem;
  align-items:baseline;
  flex-wrap:wrap;
  border-top:2px solid var(--accent);
  padding-top:1rem;
  margin-bottom:1rem;
}

.saved-header h2{
  font-family:var(--serif);
}

.saved-header span{
  font-family:var(--mono);
  color:var(--muted);
  font-size:.8rem;
}

.citation-item{
  display:flex;
  gap:1rem;
  justify-content:space-between;
  align-items:flex-start;
  padding:.9rem 1rem;
  margin-bottom:.7rem;
  border:1px solid var(--border);
  background:var(--paper);
}

.citation-item-text{
  flex:1;
  line-height:1.5;
}

.citation-item-style{
  background:var(--accent);
  color:#000;
  padding:2px 8px;
  border-radius:3px;
  font-size:.72rem;
  font-family:var(--mono);
  font-weight:700;
}

.delete-btn{
  border:none;
  background:none;
  color:#ef4444;
  font-size:1.1rem;
}
</style>

<div id="citation-root">

<header>
  <h1>Citation Builder</h1>
  <p>Format citations correctly · APA · MLA · Chicago</p>
</header>

<div class="cite-card">

  <!-- INPUT:
       User enters data into fields below -->
  <div class="field">
    <label for="cite-style">Citation Style</label>
    <select id="cite-style">
      <option value="apa">APA</option>
      <option value="mla">MLA</option>
      <option value="chicago">Chicago</option>
    </select>
  </div>

  <div class="field">
    <label for="cite-author">Author(s)</label>
    <input id="cite-author" type="text" placeholder="Smith, Jane">
  </div>

  <div class="field">
    <label for="cite-date">Publication Date</label>
    <input id="cite-date" type="text" placeholder="2024, March 5">
  </div>

  <div class="field">
    <label for="cite-title">Title</label>
    <input id="cite-title" type="text" placeholder="Climate change and cities">
  </div>

  <div class="field">
    <label for="cite-source">Website / Publication</label>
    <input id="cite-source" type="text" placeholder="The New York Times">
  </div>

  <div class="field">
    <label for="cite-url">URL (optional)</label>
    <input id="cite-url" type="text" placeholder="https://...">
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="btn-generate">Generate</button>
    <button class="btn-ghost" id="btn-copy">Copy</button>
    <button class="btn-save" id="btn-save">Save</button>
    <button class="btn-ghost" id="btn-clear">Clear</button>

  <div id="warning-box"></div>

  <!-- OUTPUT -->
  <div class="output-box" id="output-box">

</div>

<!-- LIST:
     saved citations are stored in an array and localStorage -->
<div class="saved-section" id="saved-section">
  <div class="saved-header">
    <h2>Reference List</h2>
    <span id="cite-count"></span>
    <button class="btn-ghost" id="btn-copy-all" style="margin-left:auto;">Copy All</button>
    <button class="btn-ghost" id="btn-clear-all">Clear All</button>
  </div>

  <div id="saved-list"></div>
</div>

</div>

<script>
/*
CITATION BUILDER

Purpose:
Helps students create APA, MLA, and Chicago citations.

AI Credit: AI (Claude) assisted with debugging the buildCitation
procedure and helped outline the parenthetical logic inside it.
All other code (UI, storage, event handlers) was written
by me with AI assistance in debugging (the core logic is my own).
*/

const STORAGE_KEY = "citation_builder_list_v1";

/* helper: gets trimmed value from any field */
function val(id){
  return document.getElementById(id).value.trim();
}

/* helper: extract year if present */
function getYear(date){
  const match = date.match(/\d{4}/);
  return match ? match[0] : "";
}

/*
PROCEDURE REQUIREMENT

Name: buildCitation
Parameters:
author, date, title, source, url, style

Returns:
object with citation + parenthetical
*/
function buildCitation(author, date, title, source, url, style){

  // LIST used to hold pieces of citation
  let parts = [];

  // SELECTION:
  // different formatting depending on style
  if(style === "apa"){

    if(author) parts.push(author + ".");
    if(date) parts.push("(" + date + ").");
    if(title) parts.push(title + ".");
    if(source) parts.push("<em>" + source + "</em>.");
    if(url) parts.push(url);

  }else if(style === "mla"){

    if(author) parts.push(author + ".");
    if(title) parts.push('"' + title + '."');
    if(source) parts.push("<em>" + source + "</em>,");
    if(date) parts.push(date + ",");
    if(url) parts.push(url + ".");

  }else{

    if(author) parts.push(author + ".");
    if(title) parts.push('"' + title + '."');
    if(date) parts.push("(" + date + ").");
    if(source) parts.push("<em>" + source + "</em>.");
    if(url) parts.push(url);
  }

  // SEQUENCING:
  // get author's last name then year
  let last = "";
  if(author){
    last = author.split(",")[0].trim();
  }

  let year = getYear(date);
  let parenthetical = "";

  // SELECTION for in-text citation
  if(style === "mla"){
    if(last) parenthetical = "(" + last + ")";
  }else if(style === "chicago"){
    if(last && year){
      parenthetical = "(" + last + " " + year + ")";
    }else if(last){
      parenthetical = "(" + last + ")";
    }
  }else{
    if(last && year){
      parenthetical = "(" + last + ", " + year + ")";
    }else if(last){
      parenthetical = "(" + last + ")";
    }
  }

  // ITERATION:
  // combine list items into one citation string
  let citation = "";

  for(let i = 0; i < parts.length; i++){
    if(parts[i].trim() !== ""){
      citation += (citation ? " " : "") + parts[i];
    }
  }

  return {
    citation: citation,
    parenthetical: parenthetical
  };
}

/* score completeness */
function scoreFields(author, date, title, source, url){
  let score = 0;

  if(author) score++;
  if(date) score++;
  if(title) score++;
  if(source) score++;
  if(url) score++;

  return score;
}

/* LIST: load saved citations */
function loadList(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

/* LIST: save array back */
function saveList(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

/* OUTPUT: show saved citations on page */
function renderList(){

  const list = loadList();
  const section = document.getElementById("saved-section");
  const wrap = document.getElementById("saved-list");
  const count = document.getElementById("cite-count");

  wrap.innerHTML = "";

  if(list.length === 0){
    section.classList.remove("visible");
    return;
  }

  section.classList.add("visible");
  count.textContent = list.length + " saved";

  // ITERATION through saved array
  for(let i = 0; i < list.length; i++){

    const item = document.createElement("div");
    item.className = "citation-item";

    item.innerHTML =
      '<span class="citation-item-text">' + list[i].citation + '</span>' +
      '<span class="citation-item-style">' + list[i].style.toUpperCase() + '</span>' +
      '<button class="delete-btn" data-index="' + i + '">✕</button>';

    wrap.appendChild(item);
  }

  document.querySelectorAll(".delete-btn").forEach(btn=>{
    btn.addEventListener("click", function(){

      const index = Number(this.dataset.index);
      const list = loadList();

      list.splice(index,1);
      saveList(list);
      renderList();
    });
  });
}

/* generate button */
document.getElementById("btn-generate").addEventListener("click", function(){

  // INPUT
  const author = val("cite-author");
  const date = val("cite-date");
  const title = val("cite-title");
  const source = val("cite-source");
  const url = val("cite-url");
  const style = val("cite-style");

  const ids = ["cite-author","cite-date","cite-title","cite-source"];
  const names = ["Author","Date","Title","Source"];
  const missing = [];

  ids.forEach(id=>{
    document.getElementById(id).classList.remove("error");
  });

  // ITERATION through required fields
  for(let i = 0; i < ids.length; i++){
    if(!val(ids[i])){
      missing.push(names[i]);
      document.getElementById(ids[i]).classList.add("error");
    }
  }

  const warning = document.getElementById("warning-box");

  if(missing.length > 0){
    warning.textContent = "Missing: " + missing.join(", ");
    warning.classList.add("visible");
  }else{
    warning.classList.remove("visible");
  }

  // CALL STUDENT PROCEDURE
  const result = buildCitation(author, date, title, source, url, style);

  // OUTPUT
  document.getElementById("citation-text").innerHTML = result.citation;
  document.getElementById("parenthetical-text").textContent =
    result.parenthetical ? "In-text: " + result.parenthetical : "";

  document.getElementById("output-box").classList.add("visible");

  const score = scoreFields(author,date,title,source,url);
  const banner = document.getElementById("score-banner");

  const msgs = [
    "",
    "Very incomplete",
    "Mostly incomplete",
    "Halfway there",
    "Almost complete",
    "Perfect citation"
  ];

  banner.textContent = "Completeness: " + score + "/5 - " + msgs[score];
  banner.classList.add("visible");
});

/* copy one citation */
document.getElementById("btn-copy").addEventListener("click", function(){

  const text = document.getElementById("citation-text").textContent.trim();

  if(!text){
    alert("Generate first");
    return;
  }

  navigator.clipboard.writeText(text);
});

/* save citation to LIST */
document.getElementById("btn-save").addEventListener("click", function(){

  const cite = document.getElementById("citation-text").innerHTML;

  if(!cite.trim()){
    alert("Generate first");
    return;
  }

  const list = loadList();

  list.push({
    citation: cite,
    parenthetical: document.getElementById("parenthetical-text").textContent,
    style: val("cite-style"),
    savedAt: Date.now()
  });

  saveList(list);
  renderList();
});

/* clear form */
document.getElementById("btn-clear").addEventListener("click", function(){

  ["cite-author","cite-date","cite-title","cite-source","cite-url"].forEach(id=>{
    document.getElementById(id).value = "";
  });

  document.getElementById("output-box").classList.remove("visible");
  document.getElementById("warning-box").classList.remove("visible");
  document.getElementById("score-banner").classList.remove("visible");

  document.getElementById("citation-text").innerHTML = "";
  document.getElementById("parenthetical-text").textContent = "";
});

/* copy all references */
document.getElementById("btn-copy-all").addEventListener("click", function(){

  const list = loadList();

  if(list.length === 0){
    alert("No saved citations");
    return;
  }

  let text = "";

  // ITERATION through list
  for(let i = 0; i < list.length; i++){

    const temp = document.createElement("div");
    temp.innerHTML = list[i].citation;
    text += temp.textContent + "\n\n";
  }

  navigator.clipboard.writeText(text.trim());
});

/* clear saved list */
document.getElementById("btn-clear-all").addEventListener("click", function(){

  if(confirm("Clear all saved citations?")){
    localStorage.removeItem(STORAGE_KEY);
    renderList();
  }
});

/* page load */
renderList();
</script>
